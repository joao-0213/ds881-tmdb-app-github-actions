name: CI/CD Pipeline

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy-web:
    name: Deploy Web & GitHub Pages
    needs: unit-tests 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Inject Venvs (.env)
        # Atenção: Verifique se no seu código JS você usa TMDB_KEY ou TMDB_API_KEY
        run: echo "EXPO_PUBLIC_TMDB_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Exporte Code to Web (Build)
        run: npx expo export -p web

      - name: Bypass Jekyll
        run: touch dist/.nojekyll

      - name: Upload build artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
  build-android:
    name: Build Android & Release
    runs-on: ubuntu-latest
    needs: [unit-tests, deploy-web]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "EXPO_PUBLIC_TMDB_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Expo Prebuild
        run: npx expo prebuild --platform android

      - name: Build Android Release (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/release')
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
